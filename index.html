<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="./manifest.json">
<title>SpeakUp - 思维训练平台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --card: #141414; --card2: #1c1c1c;
  --red: #e11d48; --red2: #ff2d55; --red-glow: #e11d4830;
  --blue: #3b82f6; --blue2: #60a5fa; --blue-glow: #3b82f630;
  --purple: #8b5cf6; --purple2: #a78bfa; --purple-glow: #8b5cf630;
  --green: #22c55e; --green2: #4ade80; --green-glow: #22c55e30;
  --yellow: #ff6b35;
  --text: #f0f0f0; --text2: #a0a0a0; --text3: #555; --radius: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; -webkit-tap-highlight-color:transparent; position:relative; overflow-x:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;
}
body::before { content:''; position:fixed; top:-40%; right:-20%; width:60vw; height:60vw; background:var(--purple); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); opacity:0.03; z-index:0; pointer-events:none; }
body::after { content:''; position:fixed; bottom:-30%; left:-15%; width:50vw; height:50vw; background:var(--blue); clip-path:polygon(0 0,100% 0,100% 100%); opacity:0.025; z-index:0; pointer-events:none; }

.launcher { position:relative; z-index:1; width:100%; max-width:420px; }
.logo { text-align:center; margin-bottom:36px; }
.logo h1 { font-size:36px; font-weight:900; letter-spacing:-1px; margin-bottom:8px; }
.logo h1 .accent { color:var(--red2); text-shadow:0 0 30px var(--red-glow); }
.logo p { font-size:14px; color:var(--text3); letter-spacing:2px; text-transform:uppercase; font-weight:600; }

.mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

.mode-card {
  background:var(--card); border:1px solid #ffffff08; border-radius:var(--radius);
  padding:22px 14px; cursor:pointer; transition:all 0.2s ease;
  display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px;
  text-decoration:none; color:var(--text); position:relative; overflow:hidden;
}
.mode-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; transition:opacity 0.2s; }
.mode-card:hover,.mode-card:active { transform:translateY(-4px); background:var(--card2); }

.mode-card.speak::before { background:linear-gradient(90deg,var(--red),var(--red2)); box-shadow:0 0 20px var(--red-glow); }
.mode-card.speak:hover { box-shadow:0 8px 40px var(--red-glow); border-color:#e11d4840; }
.mode-card.speak .mode-title { color:var(--red2); }
.mode-card.speak .mode-badge { background:#e11d4820; color:var(--red2); border:1px solid #e11d4830; }

.mode-card.translate::before { background:linear-gradient(90deg,var(--blue),var(--blue2)); box-shadow:0 0 20px var(--blue-glow); }
.mode-card.translate:hover { box-shadow:0 8px 40px var(--blue-glow); border-color:#3b82f640; }
.mode-card.translate .mode-title { color:var(--blue2); }
.mode-card.translate .mode-badge { background:#3b82f620; color:var(--blue2); border:1px solid #3b82f630; }

.mode-card.debate::before { background:linear-gradient(90deg,var(--purple),var(--purple2)); box-shadow:0 0 20px var(--purple-glow); }
.mode-card.debate:hover { box-shadow:0 8px 40px var(--purple-glow); border-color:#8b5cf640; }
.mode-card.debate .mode-title { color:var(--purple2); }
.mode-card.debate .mode-badge { background:#8b5cf620; color:var(--purple2); border:1px solid #8b5cf630; }

.mode-card.feynman::before { background:linear-gradient(90deg,var(--green),var(--green2)); box-shadow:0 0 20px var(--green-glow); }
.mode-card.feynman:hover { box-shadow:0 8px 40px var(--green-glow); border-color:#22c55e40; }
.mode-card.feynman .mode-title { color:var(--green2); }
.mode-card.feynman .mode-badge { background:#22c55e20; color:var(--green2); border:1px solid #22c55e30; }

.mode-icon { font-size:40px; line-height:1; }
.mode-title { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
.mode-desc { font-size:10px; color:var(--text3); line-height:1.5; }
.mode-badge { font-size:10px; padding:3px 10px; border-radius:2px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }

.stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:28px; padding:16px 0; border-top:1px solid #ffffff08; }
.stat-item { text-align:center; }
.stat-value { font-size:18px; font-weight:700; }
.stat-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

.footer { text-align:center; margin-top:32px; font-size:11px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="launcher">
  <div class="logo">
    <h1>🎯 Speak<span class="accent">Up</span></h1>
    <p>思维训练平台</p>
  </div>

  <div class="mode-grid">
    <a href="./speak.html" class="mode-card speak">
      <div class="mode-icon">🗣️</div>
      <div class="mode-title">口语训练</div>
      <div class="mode-desc">英语 AI 对话练习<br>五维评分追踪</div>
      <div class="mode-badge" id="speak-badge">开始训练</div>
    </a>
    <a href="./translate.html" class="mode-card translate">
      <div class="mode-icon">📝</div>
      <div class="mode-title">翻译训练</div>
      <div class="mode-desc">中英互译练习<br>译文精准分析</div>
      <div class="mode-badge" id="translate-badge">开始训练</div>
    </a>
    <a href="./debate.html" class="mode-card debate">
      <div class="mode-icon">🗡️</div>
      <div class="mode-title">辩论训练</div>
      <div class="mode-desc">批判性思维对练<br>逻辑结构提升</div>
      <div class="mode-badge" id="debate-badge">开始训练</div>
    </a>
    <a href="./feynman.html" class="mode-card feynman">
      <div class="mode-icon">🧒</div>
      <div class="mode-title">费曼复盘</div>
      <div class="mode-desc">输出倒逼输入<br>知识揉碎讲透</div>
      <div class="mode-badge" id="feynman-badge">开始训练</div>
    </a>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-value" id="total-speak" style="color:var(--red2);text-shadow:0 0 15px var(--red-glow)">0</div><div class="stat-label">口语</div></div>
    <div class="stat-item"><div class="stat-value" id="total-translate" style="color:var(--blue2);text-shadow:0 0 15px var(--blue-glow)">0</div><div class="stat-label">翻译</div></div>
    <div class="stat-item"><div class="stat-value" id="total-debate" style="color:var(--purple2);text-shadow:0 0 15px var(--purple-glow)">0</div><div class="stat-label">辩论</div></div>
    <div class="stat-item"><div class="stat-value" id="total-feynman" style="color:var(--green2);text-shadow:0 0 15px var(--green-glow)">0</div><div class="stat-label">复盘</div></div>
  </div>

  <div class="footer">POWERED BY GEMINI AI</div>
</div>

<script>
const KEYS = [
  {storage:'speakup_data', api:'/api/data', el:'total-speak', badge:'speak-badge'},
  {storage:'translate_data', api:'/api/translate_data', el:'total-translate', badge:'translate-badge'},
  {storage:'debate_data', api:'/api/debate_data', el:'total-debate', badge:'debate-badge'},
  {storage:'feynman_data', api:'/api/feynman_data', el:'total-feynman', badge:'feynman-badge'}
];

function loadStats() {
  KEYS.forEach(k => {
    try {
      const d = JSON.parse(localStorage.getItem(k.storage) || '{"records":[]}');
      document.getElementById(k.el).textContent = d.records.length;
      if (d.records.length > 0) document.getElementById(k.badge).textContent = `${d.records.length} 次训练`;
    } catch {}
  });
}
loadStats();

Promise.all(KEYS.map(k =>
  fetch(k.api).then(r => r.ok ? r.json() : null).catch(() => null)
    .then(data => { if (data) localStorage.setItem(k.storage, JSON.stringify(data)); })
)).then(loadStats);
</script>
</body>
</html>
